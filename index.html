<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Commander</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      color: #1E5F74;
      margin-bottom: 30px;
    }
    h2 {
      color: #1E5F74;
      border-bottom: 2px solid #1E5F74;
      padding-bottom: 10px;
      margin-bottom: 20px;
      margin-top: 30px;
    }
    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    input[type="text"], select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      flex: 1;
      min-width: 150px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: white;
    }
    .btn-add {
      background-color: #1E5F74;
    }
    .btn-export-csv {
      background-color: #2F5233;
    }
    .btn-export-json {
      background-color: #0047AB;
    }
    .btn-delete {
      background-color: #ff6b6b;
      padding: 6px 12px;
      font-size: 12px;
    }
    .export-section {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .task-list {
      list-style: none;
    }
    .task-item {
      margin-bottom: 10px;
      padding: 15px;
      border: 1px solid #ddd;
      border-left: 4px solid;
      border-radius: 4px;
    }
    .task-item.completed {
      opacity: 0.6;
    }
    .task-content {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .task-content input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .task-title {
      flex: 1;
    }
    .task-title.completed {
      text-decoration: line-through;
    }
    .org-badge {
      font-size: 12px;
      color: white;
      padding: 4px 8px;
      border-radius: 3px;
    }
    .status-message {
      margin-bottom: 1rem;
      padding: 10px;
      border-radius: 4px;
      font-weight: bold;
    }
    .status-success {
      color: #1E5F74;
      background-color: #e6f2f0;
    }
    .status-error {
      color: red;
      background-color: #ffe6e6;
    }
    .fitness-item {
      margin-bottom: 10px;
      padding: 15px;
      border: 1px solid #ddd;
      border-left: 4px solid #D4A574;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .fitness-day {
      font-weight: bold;
      min-width: 100px;
    }
    .fitness-time {
      color: #666;
    }
    .info-box {
      padding: 15px;
      background-color: #f5f5f5;
      border-radius: 4px;
      font-size: 14px;
    }
    .info-box ul {
      margin-top: 10px;
      margin-bottom: 0;
      margin-left: 20px;
    }
    .info-box li {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TaskCommander = () => {
      const [tasks, setTasks] = useState([]);
      const [newTask, setNewTask] = useState('');
      const [selectedOrg, setSelectedOrg] = useState('Beachhead');
      const [selectedTimeframe, setSelectedTimeframe] = useState('This Week');
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');

      const organizations = [
        { name: 'Beachhead', color: '#1E5F74' },
        { name: 'CulmPoint', color: '#8B4513' },
        { name: '1stWave', color: '#0047AB' },
        { name: 'MPL', color: '#2F5233' },
        { name: 'IRG', color: '#1A1816' },
        { name: 'Acme1', color: '#4A4A4A' },
        { name: 'Acme2', color: '#696969' },
        { name: 'Personal', color: '#D4A574' },
        { name: 'Divorce', color: '#C85A54' },
        { name: 'Army', color: '#556270' },
      ];

      const timeframes = ['Today', 'This Week', 'This Month', 'Q2 2026', 'Backlog'];

      const fitnessSchedule = [
        { day: 'Monday', time: '5:30am', activity: 'Running' },
        { day: 'Monday', time: '12:00pm', activity: 'Gym' },
        { day: 'Tuesday', time: '12:00pm', activity: 'Gym' },
        { day: 'Wednesday', time: '5:30am', activity: 'Running' },
        { day: 'Wednesday', time: '12:00pm', activity: 'Gym' },
        { day: 'Thursday', time: '12:00pm', activity: 'Gym' },
        { day: 'Friday', time: '5:30am', activity: 'Running' },
        { day: 'Friday', time: '12:00pm', activity: 'Gym' },
        { day: 'Saturday', time: '5:30am', activity: 'Running' },
        { day: 'Saturday', time: '12:00pm', activity: 'Gym' },
        { day: 'Sunday', time: 'Rest day', activity: 'Recovery' },
      ];

      useEffect(() => {
        try {
          setLoading(true);
          const savedTasks = localStorage.getItem('taskCommanderTasks');
          if (savedTasks) {
            setTasks(JSON.parse(savedTasks));
            setSaveStatus('✅ Loaded from local storage');
            setTimeout(() => setSaveStatus(''), 2000);
          } else {
            setTasks([]);
          }
        } catch (err) {
          setError('Error loading tasks: ' + err.message);
        } finally {
          setLoading(false);
        }
      }, []);

      const saveTasks = (updatedTasks) => {
        try {
          localStorage.setItem('taskCommanderTasks', JSON.stringify(updatedTasks));
          setSaveStatus('💾 Saved locally');
          setTimeout(() => setSaveStatus(''), 2000);
        } catch (err) {
          setError('Error saving: ' + err.message);
        }
      };

      const addTask = () => {
        if (!newTask.trim()) return;
        const task = {
          id: Date.now(),
          title: newTask,
          org: selectedOrg,
          timeframe: selectedTimeframe,
          completed: false,
          createdAt: new Date().toISOString(),
        };
        const updatedTasks = [...tasks, task];
        setTasks(updatedTasks);
        setNewTask('');
        saveTasks(updatedTasks);
      };

      const toggleTask = (id) => {
        const updatedTasks = tasks.map(t =>
          t.id === id ? { ...t, completed: !t.completed } : t
        );
        setTasks(updatedTasks);
        saveTasks(updatedTasks);
      };
